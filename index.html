<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3js Visualizer - Upload Edition</title>
    <link rel="stylesheet" href="./style.css">

    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.136.0/build/three.module.js"
          }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <h1 id="song-title">3JS VISUALIZER</h1>
        
        <!-- The Label acts as our styled button -->
        <label for="upload" class="custom-upload">CHOOSE YOUR TRACK</label>
        <input type="file" id="upload" accept="audio/*">
    </div>

    <script type="module" src="./script.js"></script>

</body>
</html>
