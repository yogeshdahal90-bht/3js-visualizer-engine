<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3js Visualizer - Live Upload</title>
    
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">

    <!-- The Import Map allows your script.js to find Three.js from a CDN -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.136.0/build/three.module.js"
          }
        }
    </script>
</head>
<body>

    <!-- UI Overlay for interaction -->
    <div id="ui-container">
        <h1 id="song-title">3JS VISUALIZER</h1>
        
        <!-- We use a label for the file input to create a custom styled button -->
        <label for="upload" class="custom-upload">CHOOSE YOUR TRACK</label>
        <input type="file" id="upload" accept="audio/*">
    </div>

    <!-- Your logic file -->
    <script type="module" src="script.js"></script>

</body>
</html>
